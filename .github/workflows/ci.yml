name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    env:
      VMARKET_USER_DATA_DIR: /tmp/vmarket-user-data
      VMARKET_DB_PATH: /tmp/vmarket-user-data/vmarket.sqlite
      VMARKET_SEC_USER_AGENT: VirtualMarketCI/0.1 ci@example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check vmarket

      - name: Test
        run: python -m pytest -q

      - name: Smoke test CLI
        run: vmarket --help
